name: run-daily

# Cron quotidien après clôture US (22:00 UTC, lun-ven). workflow_dispatch = manuel.
# Secrets requis (repo Settings → Secrets) : FMP_API_KEY, DATABASE_URL.
# Note : tier FMP gratuit (250 appels/j) → le bootstrap du plein univers (120 noms)
# se staggère sur quelques jours via fail-neutral (noms périmés re-fetchés, cache
# trimestriel accumulé). Starter FMP lève le plafond.
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Limite univers (nb de noms ; vide = complet). Tier gratuit : ~15-40 max/jour."
        required: false
        default: "15"

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install engine
        run: pip install -e "engine[store]"
      - name: Run daily job
        working-directory: engine
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_daily.py ${{ github.event.inputs.limit }}
